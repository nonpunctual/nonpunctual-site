{{ if and (isset .Site.Params "avatarurl") (not (isset .Site.Params "gravatar")) }}
  {{ with .Site.Params.avatarURL }}
    <div class="avatar">
      <a href="/avatar/"><img src="{{ . | relURL }}" alt="avatar"></a>
    </div>
  {{ end }}
{{ end }}
{{ with .Site.Params.gravatar }}
  <div class="avatar">
    <a href="/avatar/"><img src="https://www.gravatar.com/avatar/{{md5 .}}?s=240&d=mp" alt="gravatar"></a>
  </div>
{{ end }}
