<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      font-size: 62.5%;
    }
    html, body {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #091520;
    }
    body.light { background-color: #fafafa; }
    a {
      position: fixed;
      top: 1.75rem;
      left: 2rem;
      color: #dadada;
      text-decoration: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", Helvetica, sans-serif;
      font-size: 2.47rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    a:hover { color: #42a5f5; }
    body.light a { color: #212121; }
    body.light a:hover { color: #1565c0; }
    img {
      max-width: 100%;
      max-height: 100vh;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <a href="/">nonpunctual</a>
  <img src="/images/avatar.png" alt="">
  <script>
    var scheme = localStorage.getItem('colorscheme') || 'dark';
    if (scheme === 'light') {
      document.body.classList.add('light');
    }
  </script>
</body>
</html>
